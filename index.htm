<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UOC | Simulador de Reconeixements</title>
    <!-- Tailwind CSS per als estils -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React i Babel per executar el codi al navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // Definició d'icones SVG per separat per garantir estabilitat
        const Icons = {
            Graduation: ({size=24, className=""}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
            ),
            Filter: ({size=20, className=""}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            ),
            Check: ({size=20, className=""}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
            ),
            XCircle: ({size=20, className=""}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
            ),
            Clock: ({size=20, className=""}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ),
            Search: ({size=20, className=""}) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            )
        };

        const DATA = {
            universities: [
                { id: 'ucm', name: 'Universidad Complutense de Madrid' },
                { id: 'ub', name: 'Universitat de Barcelona' }
            ],
            degrees: {
                ucm: [
                    { id: 'psi_ucm', name: 'Grau en Psicologia' },
                    { id: 'ade_ucm', name: 'Grau en ADE' },
                    { id: 'law_ucm', name: 'Grau en Dret' },
                    { id: 'inf_ucm', name: 'Grau en Enginyeria Informàtica' }
                ],
                ub: [
                    { id: 'psi_ub', name: 'Grau en Psicologia' },
                    { id: 'ade_ub', name: 'Grau en ADE' },
                    { id: 'law_ub', name: 'Grau en Dret' },
                    { id: 'inf_ub', name: 'Grau en Enginyeria Informàtica' }
                ]
            },
            uocDegrees: [
                { id: 'psi_uoc', name: 'Grau de Psicologia' },
                { id: 'ade_uoc', name: 'Grau d\'Administració i Direcció d\'Empreses' },
                { id: 'law_uoc', name: 'Grau de Dret' },
                { id: 'inf_uoc', name: 'Grau d\'Enginyeria Informàtica' }
            ],
            equivalencias: {
                // PSICOLOGIA
                'psi_ucm-psi_uoc': [
                    { origin: 'Psicologia General I', originEcts: 6, target: 'Introducció a la Psicologia', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Estadística Aplicada', originEcts: 6, target: 'Tècniques d\'Anàlisi de Dades', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Fonaments de Psicobiologia', originEcts: 9, target: 'Bases biològiques del comportament', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Psicologia Social', originEcts: 6, target: 'Psicologia Social', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Neurociència Cognitiva', originEcts: 6, target: 'Psicologia del Pensament', targetEcts: 6, type: 'Obligatòria', status: 'denied', reason: 'No coincidència de continguts tècnics' },
                    { origin: 'Psicopatologia de l\'Adult', originEcts: 6, target: 'Psicopatologia Adults', targetEcts: 6, type: 'Obligatòria', status: 'pending', reason: 'Pendent de valoració: En revisió per la comissió acadèmica' },
                    { origin: 'Tècniques d\'Intervenció', originEcts: 6, target: 'Intervenció Psicològica', targetEcts: 6, type: 'Optativa', status: 'pending', reason: 'Pendent de documentació: Cal adjuntar el programa oficial detallat' },
                    { origin: 'Psicometria', originEcts: 6, target: 'Psicometria', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Psicologia de la Personalitat', originEcts: 6, target: 'Personalitat i Diferències Individuals', targetEcts: 6, type: 'Obligatòria', status: 'success' }
                ],
                // ADE
                'ade_ucm-ade_uoc': [
                    { origin: 'Introducción a la Economía', originEcts: 6, target: 'Principis d\'Economia', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Contabilidad Financiera I', originEcts: 6, target: 'Introducció a la Comptabilitat', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Matemáticas para la Empresa', originEcts: 6, target: 'Matemàtiques I', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Microeconomía I', originEcts: 6, target: 'Microeconomia', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Macroeconomía I', originEcts: 6, target: 'Macroeconomia', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Dirección Comercial', originEcts: 6, target: 'Direcció de Màrqueting', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Dirección Financiera I', originEcts: 6, target: 'Gestió Financera', targetEcts: 6, type: 'Obligatòria', status: 'pending', reason: 'Pendent de valoració: Revisió d\'equivalència en sistemes d\'inversió' },
                    { origin: 'Derecho Mercantil', originEcts: 6, target: 'Dret de l\'Empresa', targetEcts: 6, type: 'Bàsica', status: 'denied', reason: 'Diferència substancial en el temari de contractació' },
                    { origin: 'Estadística Económica', originEcts: 6, target: 'Estadística I', targetEcts: 6, type: 'Bàsica', status: 'pending', reason: 'Pendent de documentació: Cal certificat de notes original' }
                ],
                // DRET
                'law_ucm-law_uoc': [
                    { origin: 'Derecho Civil I', originEcts: 6, target: 'Dret Civil I', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Derecho Romano', originEcts: 6, target: 'Història del Dret', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Teoría del Derecho', originEcts: 6, target: 'Teoria del Dret', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Derecho Penal I', originEcts: 6, target: 'Dret Penal I', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Derecho Administrativo I', originEcts: 6, target: 'Dret Administratiu', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Derecho Constitucional I', originEcts: 6, target: 'Dret Constitucional', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Derecho Civil de Cataluña', originEcts: 6, target: 'Dret Civil de Catalunya', targetEcts: 6, type: 'Obligatòria', status: 'pending', reason: 'Pendent de valoració: Validació de crèdits territorials' },
                    { origin: 'Derecho Procesal I', originEcts: 6, target: 'Dret Processal', targetEcts: 6, type: 'Obligatòria', status: 'denied', reason: 'No coincideix amb el model d\'enjudiciament de la UOC' },
                    { origin: 'Derecho del Trabajo', originEcts: 6, target: 'Dret del Treball', targetEcts: 6, type: 'Obligatòria', status: 'pending', reason: 'Pendent de documentació: Guia docent del curs 2023-24' }
                ],
                // INFORMÀTICA
                'inf_ucm-inf_uoc': [
                    { origin: 'Fundamentos de Programación', originEcts: 6, target: 'Fonaments de Programació', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Álgebra Lineal', originEcts: 6, target: 'Àlgebra', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Cálculo', originEcts: 6, target: 'Anàlisi Matemàtica', targetEcts: 6, type: 'Bàsica', status: 'success' },
                    { origin: 'Estructura de Datos', originEcts: 6, target: 'Estructures de Dades', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Sistemas Operativos', originEcts: 6, target: 'Sistemes Operatius', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Bases de Datos', originEcts: 6, target: 'Disseny i Ús de Bases de Dades', targetEcts: 6, type: 'Obligatòria', status: 'success' },
                    { origin: 'Ingeniería del Software', originEcts: 6, target: 'Enginyeria del Software', targetEcts: 6, type: 'Obligatòria', status: 'pending', reason: 'Pendent de valoració: Comparativa de metodologies Àgil vs Cascada' },
                    { origin: 'Arquitectura de Computadores', originEcts: 6, target: 'Arquitectura de Computadors', targetEcts: 6, type: 'Obligatòria', status: 'denied', reason: 'Càrrega lectiva insuficient en maquinari' },
                    { origin: 'Inteligencia Artificial', originEcts: 6, target: 'Intel·ligència Artificial', targetEcts: 6, type: 'Optativa', status: 'pending', reason: 'Pendent de documentació: Cal programa pràctic del laboratori' }
                ]
            }
        };

        const App = () => {
            const [univ, setUniv] = useState('');
            const [sourceDegree, setSourceDegree] = useState('');
            const [targetDegree, setTargetDegree] = useState('');
            const [statusFilter, setStatusFilter] = useState('success');

            const availableSourceDegrees = useMemo(() => DATA.degrees[univ] || [], [univ]);
            
            const allEquivalencies = useMemo(() => {
                const key = `${sourceDegree}-${targetDegree}`;
                return DATA.equivalencias[key] || [];
            }, [sourceDegree, targetDegree]);

            const filteredEquivalencies = useMemo(() => {
                if (statusFilter === 'all') return allEquivalencies;
                return allEquivalencies.filter(eq => eq.status === statusFilter);
            }, [allEquivalencies, statusFilter]);

            const totalCredits = useMemo(() => {
                return allEquivalencies
                    .filter(eq => eq.status === 'success')
                    .reduce((acc, curr) => acc + curr.targetEcts, 0);
            }, [allEquivalencies]);

            const percentage = Math.min(Math.round((totalCredits / 240) * 100), 100);

            const resetFilters = () => {
                setUniv(''); setSourceDegree(''); setTargetDegree(''); setStatusFilter('success');
            };

            const isDataSelected = univ && sourceDegree && targetDegree;

            return (
                <div className="min-h-screen text-slate-900 flex flex-col">
                    <header className="bg-[#000078] text-white p-4 shadow-lg sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-white p-1 rounded">
                                    <Icons.Graduation className="text-[#000078]" size={32} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight">UOC | Reconeixements</h1>
                                    <p className="text-xs opacity-80 uppercase tracking-widest">Simulador de Reconeixement de Crèdits</p>
                                </div>
                            </div>
                            <button onClick={resetFilters} className="text-sm bg-white/10 hover:bg-white/20 px-4 py-2 rounded-md transition-all font-medium">
                                Nova Consulta
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-4 gap-6 flex-grow w-full">
                        {/* Panell de Paràmetres */}
                        <aside className="lg:col-span-1 space-y-6">
                            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <div className="flex items-center gap-2 mb-4 text-[#000078]">
                                    <Icons.Filter size={18} />
                                    <h2 className="font-semibold text-lg ml-2">Paràmetres</h2>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Universitat d'Origen</label>
                                        <select value={univ} onChange={(e) => { setUniv(e.target.value); setSourceDegree(''); }} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-[#000078]/20 transition-all">
                                            <option value="">Selecciona...</option>
                                            {DATA.universities.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Pla d'Estudis Origen</label>
                                        <select disabled={!univ} value={sourceDegree} onChange={(e) => setSourceDegree(e.target.value)} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-[#000078]/20 disabled:opacity-50 transition-all">
                                            <option value="">Selecciona el grau...</option>
                                            {availableSourceDegrees.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="pt-4 border-t border-slate-100">
                                        <label className="block text-xs font-bold text-slate-500 uppercase mb-1 font-bold text-[#000078]">Grau Destí (UOC)</label>
                                        <select value={targetDegree} onChange={(e) => setTargetDegree(e.target.value)} className="w-full px-3 py-2 bg-white border-2 border-[#000078]/20 rounded-lg font-bold outline-none focus:border-[#000078] transition-all">
                                            <option value="">Selecciona el destí...</option>
                                            {DATA.uocDegrees.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-3">Resultats a mostrar</label>
                                <div className="space-y-2">
                                    {[
                                        { id: 'success', label: 'Reconegudes', color: 'bg-green-500' },
                                        { id: 'denied', label: 'Denegades', color: 'bg-red-500' },
                                        { id: 'pending', label: 'No valorades', color: 'bg-amber-500' },
                                        { id: 'all', label: 'Totes les sol·licituds', color: 'bg-slate-300' }
                                    ].map(opt => (
                                        <button key={opt.id} onClick={() => setStatusFilter(opt.id)} className={`w-full flex items-center justify-between px-3 py-2 rounded-lg text-sm transition-all ${statusFilter === opt.id ? 'bg-[#000078] text-white font-bold shadow-md' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}>
                                            <div className="flex items-center gap-2">
                                                <span className={`w-2 h-2 rounded-full ${opt.color}`}></span>
                                                {opt.label}
                                            </div>
                                            {statusFilter === opt.id && <Icons.Check size={14} />}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </aside>

                        <section className="lg:col-span-3 space-y-6">
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200 flex flex-col items-center justify-center text-center">
                                <span className="text-slate-500 text-sm font-medium">Crèdits Reconeguts Totals</span>
                                <span className="text-5xl font-bold text-[#000078] my-2">{totalCredits}</span>
                                <div className="w-full max-w-md h-3 bg-slate-100 rounded-full overflow-hidden mt-4">
                                    <div className="h-full bg-green-500 transition-all duration-1000 ease-out" style={{ width: `${percentage}%` }}></div>
                                </div>
                                <span className="text-sm text-slate-400 mt-3 font-medium">Has completat el {percentage}% del grau</span>
                            </div>

                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center text-sm">
                                    <h3 className="font-semibold flex items-center gap-2">
                                        <Icons.Search size={16} />
                                        Detall d'equivalències ({statusFilter === 'all' ? 'Totes' : statusFilter === 'success' ? 'Reconegudes' : statusFilter === 'denied' ? 'Denegades' : 'No valorades'})
                                    </h3>
                                    <span className="text-slate-400 font-medium">{filteredEquivalencies.length} registres</span>
                                </div>

                                {isDataSelected ? (
                                    filteredEquivalencies.length > 0 ? (
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left">
                                                <thead className="bg-slate-50/50 text-slate-500 text-[10px] uppercase tracking-wider">
                                                    <tr>
                                                        <th className="px-6 py-3 font-bold">Assignatura Origen</th>
                                                        <th className="px-6 py-3 text-center">Estat</th>
                                                        <th className="px-6 py-3">Assignatura UOC / Observacions</th>
                                                        <th className="px-6 py-3 text-center">ECTS</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {filteredEquivalencies.map((eq, index) => (
                                                        <tr key={index} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="px-6 py-4">
                                                                <div className="font-medium text-slate-700">{eq.origin}</div>
                                                                <div className="text-[10px] text-slate-400">{eq.originEcts} ECTS en origen</div>
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                <div className="flex justify-center">
                                                                    {eq.status === 'success' && <Icons.Check className="text-green-500" size={24} />}
                                                                    {eq.status === 'denied' && <Icons.XCircle className="text-red-500" size={24} />}
                                                                    {eq.status === 'pending' && <Icons.Clock className="text-amber-500" size={24} />}
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4">
                                                                {eq.status === 'success' ? (
                                                                    <div>
                                                                        <div className="font-bold text-[#000078]">{eq.target}</div>
                                                                        <span className="inline-block px-2 py-0.5 bg-blue-100 text-blue-700 text-[10px] font-bold rounded mt-1 uppercase tracking-tighter">
                                                                            {eq.type}
                                                                        </span>
                                                                    </div>
                                                                ) : (
                                                                    <div>
                                                                        <div className={`font-bold text-sm ${eq.status === 'denied' ? 'text-red-600' : 'text-amber-600'}`}>
                                                                            {eq.status === 'denied' ? 'Denegada' : 'Pendent'}
                                                                        </div>
                                                                        <div className="text-xs text-slate-500 mt-1 italic leading-tight">
                                                                            {eq.reason}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </td>
                                                            <td className="px-6 py-4 text-center font-bold">
                                                                {eq.status === 'success' ? eq.targetEcts : '-'}
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <div className="py-24 flex flex-col items-center justify-center text-slate-400">
                                            <Icons.Search size={48} className="opacity-20 mb-4" />
                                            <p className="font-medium">No hi ha registres per a aquest estat.</p>
                                        </div>
                                    )
                                ) : (
                                    <div className="py-24 flex flex-col items-center justify-center text-slate-400">
                                        <Icons.Graduation size={48} className="opacity-20 mb-4" />
                                        <p className="font-medium text-slate-600 text-center">Configura la teva trajectòria</p>
                                        <p className="text-sm text-center">Selecciona universitat i graus per veure el detall.</p>
                                    </div>
                                )}
                            </div>
                        </section>
                    </main>

                    <footer className="p-8 text-center text-slate-400 text-xs italic">
                        <div className="flex justify-center gap-6 mb-3">
                            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> Reconeguda</span>
                            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-red-500"></span> Denegada</span>
                            <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-amber-500"></span> Pendent</span>
                        </div>
                        <p>© 2026 Universitat Oberta de Catalunya. Prototip interactiu</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
